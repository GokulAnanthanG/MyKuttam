# Default server configuration
# UPDATED WITH VIDEO UPLOAD SUPPORT

server {
    # SSL configuration
    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mykuttam.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mykuttam.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    root /var/www/html;

    # Add index.php to the list if you are using PHP
    index index.html index.htm index.nginx-debian.html;

    server_name mykuttam.xyz www.mykuttam.xyz;

    # ============================================
    # CRITICAL: Video Upload Configuration
    # ============================================
    
    # Increase max upload size (100MB - adjust if you need larger videos)
    # Default is 1MB which is too small for videos
    client_max_body_size 100M;

    # Increase timeouts for large file uploads (5 minutes)
    client_body_timeout 300s;
    client_header_timeout 300s;
    
    # Proxy timeouts (important for large uploads)
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # Buffer settings
    client_body_buffer_size 128k;
    
    # Disable buffering for large uploads (CRITICAL!)
    # This prevents nginx from buffering the entire file in memory
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        # First attempt to serve request as file, then
        # as directory, then fall back to displaying a 404.
        proxy_pass http://localhost:3000; #or your app port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # IMPORTANT: Disable buffering for uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Optional: Specific location for API endpoints with larger limits
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Larger limit specifically for API uploads
        client_max_body_size 100M;
        client_body_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #       deny all;
    #}
}

# HTTP to HTTPS redirect
server {
    if ($host = www.mykuttam.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = mykuttam.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;

    server_name mykuttam.xyz www.mykuttam.xyz;
    return 404; # managed by Certbot
}






