# Nginx Configuration for Video Upload Support
# Add these settings to your nginx server block or http block

server {
    # ... your existing server configuration ...

    # Increase client body size limit (default is 1MB, too small for videos)
    # Set this to your maximum video size (e.g., 100MB, 500MB, or 1GB)
    client_max_body_size 100M;

    # Increase timeouts for large file uploads
    client_body_timeout 300s;        # Time to read client request body
    client_header_timeout 300s;      # Time to read client request header
    
    # Proxy timeouts (if using nginx as reverse proxy to Node.js/Express)
    proxy_connect_timeout 300s;      # Time to establish connection with backend
    proxy_send_timeout 300s;         # Time to send request to backend
    proxy_read_timeout 300s;         # Time to read response from backend
    
    # Buffer settings for large uploads
    client_body_buffer_size 128k;    # Buffer size for request body
    proxy_buffering off;             # Disable buffering for large uploads (recommended)
    proxy_request_buffering off;     # Disable request buffering for uploads
    
    # If you're using nginx as reverse proxy
    location /api/ {
        proxy_pass http://your-backend-server:port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Important: Don't buffer large uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }
}






